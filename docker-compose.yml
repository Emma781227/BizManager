version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: commerce_postgres
    environment:
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce_dev_123
      POSTGRES_DB: commerce
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: commerce_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@commerce.local
      PGADMIN_DEFAULT_PASSWORD: admin_123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
